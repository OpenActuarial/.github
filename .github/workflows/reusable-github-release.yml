# Org-wide reusable GitHub release: extracts the latest changelog section
# and publishes it as release notes for the pushed tag.
name: reusable-github-release

on:
  workflow_call:

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract latest changelog section
        run: |
          awk '/^## /{n++} n==1' CHANGELOG.md > release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
